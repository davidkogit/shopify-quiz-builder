# Netlify deployment configuration for Quiz Kit
# The @netlify/plugin-nextjs handles the build,
# runtime, ISR, middleware, and image optimization.
# Requires Node 18+. Supports Next.js 13.5+ App Router.

[build]
  command = "npx prisma generate && npx prisma db push --skip-generate && next build && npm run widget:build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
